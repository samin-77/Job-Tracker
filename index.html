<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/briefcase.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen font-sans transition-colors duration-300">
    <header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg text-white flex items-center justify-center">
                <i class="fa-solid fa-briefcase text-lg"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800 dark:text-white">JobTracker by Ishfak Mahbub Samin</h1>
        </div>

        <button onclick="toggleTheme()" class="p-2 px-3 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:ring-2 ring-indigo-500 transition-all flex items-center gap-2">
            <span class="dark:hidden flex items-center gap-2 font-bold text-xs uppercase tracking-tighter">
                <i class="fa-solid fa-moon"></i> Dark Mode
            </span>
            <span class="hidden dark:flex items-center gap-2 font-bold text-xs uppercase tracking-tighter">
                <i class="fa-solid fa-sun"></i> Light Mode
            </span>
        </button>
    </header>
    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <section class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-indigo-500 shadow-[0_0_15px_-5px_rgba(99,102,241,0.2)] dark:shadow-[0_0_20px_rgba(99,102,241,0.3)]">
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Total Applications</p>
                <h2 id="total-count" class="text-4xl font-bold mt-2 text-slate-800 dark:text-white">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-emerald-500 shadow-[0_0_15px_-5px_rgba(16,185,129,0.2)] dark:shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Interviews</p>
                <h2 id="interview-count" class="text-4xl font-bold mt-2 text-emerald-600">0</h2>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 border-l-4 border-l-rose-500 shadow-[0_0_15px_-5px_rgba(244,63,94,0.2)] dark:shadow-[0_0_20px_rgba(244,63,94,0.3)]">
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold mt-2 text-rose-600">0</h2>
            </div>
        </section>
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Available Jobs</h2>
                <p class="text-slate-500 dark:text-slate-400">Manage your applications</p>
            </div>
            <div class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-4 py-2 rounded-full font-semibold text-sm">
                Showing: <span id="section-job-count">0 of 0</span>
            </div>
        </div>
        <div class="flex border-b border-slate-200 dark:border-slate-700 mb-8 overflow-x-auto whitespace-nowrap">
            <button onclick="switchTab('all')" id="tab-all" class="px-6 py-3 font-medium text-indigo-600 border-b-2 border-indigo-600 transition-all">All Jobs</button>
            <button onclick="switchTab('interview')" id="tab-interview" class="px-6 py-3 font-medium text-slate-500 hover:text-indigo-600 transition-all">Interview</button>
            <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-3 font-medium text-slate-500 hover:text-indigo-600 transition-all">Rejected</button>
        </div>
        <div id="jobs-container" class="flex flex-col gap-6 pb-12"></div>
        <div id="no-jobs-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="relative mb-8">
                <div class="absolute inset-0 bg-indigo-500/20 blur-3xl rounded-full"></div>
                <div class="relative w-48 h-48 md:w-56 md:h-56 rounded-full overflow-hidden border-8 border-white dark:border-slate-800 shadow-2xl bg-white dark:bg-slate-800">
                    <img src="/B13-A4-PH-Job-Tracker-main/jobs.png" alt="No jobs available" class="w-full h-full object-contain p-4 transition-transform hover:scale-110 duration-500">
                </div>
            </div>
            <h3 class="text-2xl font-black text-slate-800 dark:text-white mb-2">No Jobs Available</h3>
            <p class="text-slate-500 dark:text-slate-400 max-w-xs text-base font-medium leading-relaxed">
                Your career journey is just beginning! Add some jobs to get started.
            </p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
