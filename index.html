<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <i class="fa-solid fa-briefcase"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">JobTracker</h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium uppercase tracking-wider">Total Applications</p>
                <h2 id="total-count" class="text-4xl font-bold mt-2 text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-emerald-500">
                <p class="text-slate-500 text-sm font-medium uppercase tracking-wider">Interviews</p>
                <h2 id="interview-count" class="text-4xl font-bold mt-2 text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 border-l-4 border-l-rose-500">
                <p class="text-slate-500 text-sm font-medium uppercase tracking-wider">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold mt-2 text-rose-600">0</h2>
            </div>
        </section>

        <div class="flex flex-col md:flex-row justify-between items-end mb-6 gap-4">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Available Jobs</h2>
                <p class="text-slate-500">Track and manage your career opportunities</p>
            </div>
            <div class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full font-semibold text-sm">
                Jobs Found: <span id="section-job-count">0</span>
            </div>
        </div>

        <div class="flex border-b border-slate-200 mb-8 overflow-x-auto">
            <button onclick="switchTab('all')" id="tab-all" class="px-6 py-3 font-medium text-indigo-600 border-b-2 border-indigo-600 transition-all">All Jobs</button>
            <button onclick="switchTab('interview')" id="tab-interview" class="px-6 py-3 font-medium text-slate-500 hover:text-indigo-600 transition-all">Interview</button>
            <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-3 font-medium text-slate-500 hover:text-indigo-600 transition-all">Rejected</button>
        </div>

        <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>

        <div id="no-jobs-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="bg-slate-200 w-20 h-20 rounded-full flex items-center justify-center mb-4">
                <i class="fa-solid fa-magnifying-glass text-2xl text-slate-400"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-700">No Jobs Available</h3>
            <p class="text-slate-500 max-w-xs">There are currently no listings in this category.</p>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
